         data-desc=" 01 - 02 · 2026 <br>
         Half Letter size, Proxima Nova Adobe InDesign, Adobe Photoshop <br><br>
         Transforming the article 'I Belong to This' by Gwen Smith into a zine.  Reflecting on her collages and history, I focused the zine on the significance of her culture, her past, and her community. Only using the featured images in the article with the specific text from the article, and limiting myself to 3 colours: black, white, and red. The zine was developed through a physical collage I created from the article, followed by a typographic iteration, inspiring me to contrast the organic forms of a collage with typographic elements.">
        <span class="card__title">I Belong To This</span>
        <div class="card__img-wrap">
          <img src="../work/graphics/ibelong/4.png" alt="I Belong To This" />
        </div>

         Touch Designer, Adobe Photoshop <br><br>

        <span class="card__title">Time</span>

         Adobe Illustrator, Photoshop, InDesign, 5.5x8.5 <br><br>
         Spirit was inspired and made by exploring the institutionalisation of artworks from the Fluxus movement. Focused on movement, life, and technology, the zine and video collaborate to explore the true spirit and values of Fluxus. As my first zine, Spirit challenged me to explore the different aspects of book design and curation. Through different perspectives, this project argues against itself. Have we lost the fluxus Spirit?">

         Digital Photography <br><br>
         Styled by Adela Campuzano, inspired by the Vogue Italia July 2003 editorial by Steven Meisel. I hoped to capture the light, warmth, and 'lived-in' feel of clothing and furniture. An explosion of colours feels  calm and quiet. Set styling (me), fashion styling (Adela) collaborated and were able to communicate the significance of women's materialism, consumerism, playfulness, and preception.">

         data-desc="11 - 12 · 2025 <br>
         Letter size, Saddle stich, Akzidenz-Grotesk, Times New Roman, Adobe InDesign <br><br>
         A book designed using content adapted from a Wikipedia entry, shaped within a 16-page format and defined typographic, colour, and image constraints. The publication explores simplification, layout structure, and type composition, with pull-quotes used to echo the rhythm and energy of house music. Emphasis is placed on consistency across spreads through a cohesive use of fonts, colour, and imagery. The final outcome is a printed publication, saddle-stitched.">
        <span class="card__title">House</span>
        <div class="card__img-wrap">
          <img src="../work/graphics/house/final5.png" alt="House" />
        </div>
      </a>
